<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Surat zarezz Dev</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1><i class="fas fa-heart"></i> LoveLetter Studio Zarezz Dev <i class="fas fa-heart"></i></h1>
                <p>Buat surat cinta romantis dengan animasi ajaib ✨</p>
            </div>
        </header>

        <!-- Main Studio -->
        <div class="studio">
            <!-- Template Gallery -->
            <section class="templates-section">
                <h2><i class="fas fa-th-large"></i> Pilih Template</h2>
                <div class="templates-grid" id="templatesGrid">
                    <!-- Templates akan di-generate via JS -->
                </div>
            </section>

            <!-- Editor -->
            <section class="editor-section" id="editorSection" style="display: none;">
                <div class="editor-header">
                    <button class="back-btn" onclick="showTemplates()">
                        <i class="fas fa-arrow-left"></i> Kembali
                    </button>
                    <h2>Editor Surat Cinta</h2>
                    <div class="editor-actions">
                        <button class="ai-btn" onclick="generateRomanticText()">
                            <i class="fas fa-magic"></i> AI Romantis
                        </button>
                        <button class="preview-btn" onclick="previewLetter()">
                            <i class="fas fa-eye"></i> Preview
                        </button>
                        <button class="publish-btn" onclick="publishLetter()">
                            <i class="fas fa-rocket"></i> Publish
                        </button>
                    </div>
                </div>
                
                <div class="editor-content">
                    <!-- Customization Panel -->
                    <div class="customize-panel">
                        <h3><i class="fas fa-palette"></i> Kustomisasi</h3>
                        
                        <div class="customize-group">
                            <label>Template:</label>
                            <select id="templateSelect" onchange="changeTemplate()">
                                <option value="romantic-rose">🌹 Romantic Rose</option>
                                <option value="starry-night">⭐ Starry Night</option>
                                <option value="sakura">🌸 Sakura Love</option>
                                <option value="heart-rain">💖 Heart Rain</option>
                                <option value="vintage">📜 Vintage Love</option>
                            </select>
                        </div>

                        <div class="customize-group">
                            <label>Judul Surat:</label>
                            <input type="text" id="letterTitle" placeholder="Kepada Cintaku...">
                        </div>

                        <div class="customize-group">
                            <label>Isi Surat:</label>
                            <textarea id="letterContent" rows="8" placeholder="Tuliskan kata-kata cintamu di sini..."></textarea>
                        </div>

                        <div class="customize-group">
                            <label>Tanda Tangan:</label>
                            <input type="text" id="signature" placeholder="Dari: [Nama Kamu]">
                        </div>

                        <div class="customize-group">
                            <label>Musik Latar:</label>
                            <select id="bgMusic">
                                <option value="none">Tanpa Musik</option>
                                <option value="piano">Piano Romantis</option>
                                <option value="guitar">Gitar Akustik</option>
                                <option value="violin">Biola Cinta</option>
                            </select>
                        </div>
                    </div>

                    <!-- Preview Area -->
                    <div class="preview-area">
                        <iframe id="previewFrame" style="display: none;"></iframe>
                        <div id="livePreview" class="live-preview">
                            <!-- Live preview akan di-generate -->
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- Publish Modal -->
        <div class="modal" id="publishModal">
            <div class="modal-content">
                <h3><i class="fas fa-link"></i> Surat Cinta Siap Dipublish!</h3>
                <p>Link unik suratmu:</p>
                <input type="text" id="publishUrl" readonly>
                <div class="modal-actions">
                    <button class="copy-btn" onclick="copyLink()">Salin Link</button>
                    <button class="share-btn" onclick="shareLetter()">Bagikan</button>
                    <button class="close-modal" onclick="closePublishModal()">Tutup</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
                      </html>
